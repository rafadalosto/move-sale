<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dalosto's Moving Sale — Almere - 1349 BA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700&family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-header__title">Dalosto's Moving Sale</h1>
        <a
          class="site-header__location"
          href="https://maps.app.goo.gl/VbBdx1uCVJzDwr268"
          target="_blank"
          rel="noopener"
          >📍 Almere</a
        >
        <a
          class="site-header__whatsapp"
          href="https://wa.me/31620659657"
          target="_blank"
          rel="noopener"
          >💬 WhatsApp</a
        >
      </div>
    </header>

    <nav class="filter-tabs" aria-label="Filter listings">
      <button
        type="button"
        class="filter-tabs__btn filter-tabs__btn--active"
        data-filter="all"
      >
        All
      </button>
      <button type="button" class="filter-tabs__btn" data-filter="deals">
        Deals
      </button>
    </nav>

    <main>
      <p id="load-error" class="load-error" hidden>
        Couldn't load items — try refreshing.
      </p>
      <div id="grid" class="grid"></div>
    </main>

    <div id="lightbox" class="lightbox" hidden>
      <button class="lightbox__close" aria-label="Close" type="button">
        ✕
      </button>
      <button
        class="lightbox__arrow lightbox__arrow--prev"
        aria-label="Previous photo"
        type="button"
      >
        ‹
      </button>
      <img id="lightbox-image" class="lightbox__image" src="" alt="" />
      <button
        class="lightbox__arrow lightbox__arrow--next"
        aria-label="Next photo"
        type="button"
      >
        ›
      </button>
    </div>

    <script src="render.js"></script>
    <script src="app.js"></script>
  </body>
</html>
